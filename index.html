<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Devil's Workshop</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div>
          <h1>The Devil's Workshop</h1>
          <p id="tagline" class="tagline">Hex-based 2048. Reach 666 to <s>win</s> summon Satan.</p>
        </div>
        <div class="controls">
          <button id="new-game">New Game</button>
          <div class="scoreboard">
            <div class="score">
              <span class="label">Score</span>
              <span id="score-value">0</span>
            </div>
            <div class="score">
              <span class="label">Best Tile</span>
              <span id="best-tile">0</span>
            </div>
          </div>
        </div>
      </header>

      <main>
        <div class="board-shell">
          <div id="board" aria-label="Hex board"></div>
          <div id="message" hidden></div>
        </div>
        <div class="instructions">
          <p>Press and hold to preview a direction, release to commit. Arrow keys also preview (hold two for diagonals). The glowing edge shows where pieces will fall.</p>
        </div>
      </main>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
