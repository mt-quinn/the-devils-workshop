<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>The Devil's Workshop</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="header-row">
          <h1 class="title">The Devil's Workshop</h1>
          <button id="new-game">New Game</button>
        </div>
        <div class="objective" id="objective">
          <span class="objective-dot" aria-hidden="true"></span>
          <span class="objective-text" id="objective-text">Reach 666 to <s>win</s> summon Satan</span>
        </div>
        <div class="controls">
          <div class="scoreboard">
            <div class="score">
              <span class="label">Score</span>
              <span id="score-value">0</span>
            </div>
            <div class="score" id="best-score-panel">
              <span class="label">Best</span>
              <span id="best-score">0</span>
            </div>
            <div class="score">
              <span class="label">Best Tile</span>
              <span id="best-tile">0</span>
            </div>
          </div>
        </div>
      </header>

      <main>
        <div class="board-shell">
          <div id="board" aria-label="Hex board"></div>
          <div id="message" hidden></div>
        </div>
      </main>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
